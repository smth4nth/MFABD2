name: 🐛 Bug 反馈
description: 识别错误、操作异常、连接错误等
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🚨 提问前必读 🚨
        **没有 `debug` 文件夹（缺少截图）的反馈，我们无法定位图像识别问题，此类 Issue 将被直接关闭。**
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认（必勾）
      options:
        - label: 我使用的是最新版本，且确认该 Bug 未被其他人反馈过。
          required: true
        - label: 我明白**单传文本 log 无法修 Bug**，我已经准备好了完整的 `debug` 文件夹或一键打包的 zip。
          required: true
        - label: 如果我没有上传有效的日志和截图，我接受这个 Issue 被直接关闭。
          required: true
  - type: textarea
    id: describe
    attributes:
      label: 问题描述
      description: 发生了什么？当时是怎么操作的？请简述。
      placeholder: |
        例如：在主界面点击开始任务后，卡在加载画面，没有继续点击下一步。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MFA 版本号
      description: 请提供具体版本号（例如：v2.4.4-beta.251117.c721d34）
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: 运行环境配置
      description: 系统环境&CPU型号 / 模拟器品牌与版本 / 分辨率与 DPI / GPU 型号（若开启加速）
      placeholder: |
        例如：Mac M1 / MuMu 12 / 1920x1080 270DPI / 截图增强已开启 / RTX 4060
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 🚨 必须上传：日志与 debug 文件夹 (不传精力耗尽直接关闭)
      description: |
        **⚠️ 只有文本 log 我们只能靠猜！必须有现场图！**
        
        **最简单的方法：**
        直接使用软件右上角的 **【一键导出日志】** 功能，将生成的 `zip` 压缩包拖拽到下方输入框中。

        <details>
        <summary>🌟 （点击展开）高级用户专属：提交最高质量 Log（将被优先处理！）</summary>
        
        想让我们 **100% 秒杀** 你的问题吗？请提供带有视觉数据的调试包：
        
        1. 停止当前任务，进入左下角 `设置` -> `运行设置`。
        2. 下滑勾选 **`启用保存截图`** 和 **`选中节点命中截图`**。
        3. 重新运行并复现问题。
        4. 再次点击右上角 **【一键导出日志】**，此时的 zip 包具有最高质量！
        *(注：成功抓取后请记得关闭上述选项，以免日常使用占用硬盘)*
        </details>
        
        <details>
        <summary>📁 （点击展开）我想手动寻找并上传文件</summary>
        
        1. 必须上传 `debug` 文件夹（包含出错截图&核心日志，这是修 Bug 的关键）。
        2. 必须上传 `log` 文件夹中的 `maa.log`（包含UI配置，知道你怎么运行的）。
        3. 请将它们打包压缩后拖入下方。
        </details>
      placeholder: |
        👉 请将打包好的 .zip 或 .7z 文件直接拖拽到这里 👈
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 🎥 强烈建议：录屏或原图（选填但能救命）
      description: |
        如果能提供发生问题前后几秒的**包含模拟器画面与 MFA 回显的录屏**，或者无遮挡的模拟器原图，可以成倍加快修 Bug 的速度！谢谢你的协助！
      placeholder: 将视频或图片文件拖拽到此处
    validations:
      required: false