[remote.github]
owner = "sunyink"
repo = "MFABD2"

[changelog]
header = """
# 更新日志
"""

body = """
{# 定义生成仓库URL的宏 #}
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{# 定义单个提交的打印格式 #}
{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
    {% if commit.breaking %}[**breaking**] {% endif %}\
    {{ commit.message | split(pat="\n") | first | upper_first }} \
    @{{ commit.author.name }}
    
    {# 处理共同作者 #}
    {%- if commit.footers -%}
        {%- for footer in commit.footers -%}
            {%- if footer.token == "Co-authored-by" -%}
                {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
            {%- endif -%}
        {%- endfor -%}
    {%- endif %}
{% endmacro -%}

{# 版本标题 #}
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{# 按分组显示提交 #}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    
    {# 先显示有作用域(scope)的提交，并按作用域排序 #}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    
    {# 再显示没有作用域的提交 #}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}

{# 新贡献者部分 #}
{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者 ❤️
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} 做出了他们的首次贡献
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

footer = """
## 历史版本更新内容

[已有 Mirror酱 CDK？前往 Mirror酱 高速下载](https://mirrorchyan.com/zh/projects?rid=MFABD2)
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
all = false  # 只考虑当前分支
include_paths = ["**"]
sort_commits = "newest"
merge_commits = true  # 包含合并提交

commit_parsers = [
    { message = "^(?i)feat", group = "✨ 新功能" },
    { message = "^(?i)fix", group = "🐛 Bug修复" },
    { message = "^(?i)impr", group = "💪 功能增强" },
    { message = "^(?i)docs", group = "📚 文档" },
    { message = "^(?i)perf", group = "🚀 性能优化" },
    { message = "^(?i)refactor", group = "🚜 代码重构" },
    { message = "^(?i)style", group = "🎨 样式" },
    { message = "^(?i)test", group = "🧪 测试" },
    { message = "^(?i)(?:build|ci|chore\\(build\\))", group = "🔨 构建维护" },
    { message = "^(?i)chore\\(deps\\)", group = "📦 依赖更新" },
    { message = "^(?i)chore", group = "🔧 日常维护" },
    { body = "(?i).*security", group = "🔒 安全" },
    { message = "^(?i)revert", group = "◀️ 撤销" },
    { message = ".*", group = "其他变更" }
]

ignore_tags = "rc"
sort_commits = "oldest"

[git.github]
commits = true