name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no ubuntu@43.160.196.56 "echo 'SSH OK'"

      - name: Sync deploy/ to server
        run: |
          SSH_OPTS="-i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no"

          # 同步配置文件（排除 apk/ 子目录）
          rsync -avz --exclude='apk/' \
            -e "ssh $SSH_OPTS" \
            deploy/ ubuntu@43.160.196.56:~/bd2-deploy/

          # 同步 APK（仅当 apk/ 下有文件时才同步，APK 通常已在服务器）
          if [ -n "$(ls deploy/apk/ 2>/dev/null)" ]; then
            rsync -avz \
              -e "ssh $SSH_OPTS" \
              deploy/apk/ ubuntu@43.160.196.56:~/bd2-deploy/
          else
            echo "deploy/apk/ 为空，跳过 APK 同步"
          fi
